name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Format ───────────────────────────────────────────────────────────────
      - name: Check formatting (Prettier)
        run: pnpm format:check

      # ── Type check ───────────────────────────────────────────────────────────
      - name: Type check (web)
        run: pnpm --filter @flowspace/web type-check

      - name: Type check (extension)
        run: pnpm --filter @flowspace/extension type-check

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint (web)
        run: pnpm --filter @flowspace/web lint

      - name: Lint (extension)
        run: pnpm --filter @flowspace/extension lint

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Run backend tests
        run: pnpm --filter @flowspace/web test
        env:
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
